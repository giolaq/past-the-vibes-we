name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  workshop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn setup
      - run: yarn verify
