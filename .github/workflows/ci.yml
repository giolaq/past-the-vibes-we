name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  workshop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            packages/mini-harness/yarn.lock
            packages/workshop-harness/yarn.lock
            apps/pocket-cinema/yarn.lock
      - run: yarn setup
      - run: yarn verify
